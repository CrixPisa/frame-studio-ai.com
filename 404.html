<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Business Servizi</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Quando GitHub Pages non trova una pagina, serve questo 404.html
      // che reindirizza alla homepage preservando il path come query string
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = window.location.origin + '/?p=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body>
    <p>Reindirizzamento in corso...</p>
  </body>
</html>
